services:

  db:
    image: postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-app}

  adminer:
    image: adminer
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-http.rule=Host(`adminer.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-https.rule=Host(`adminer.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-https.tls=true
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-adminer-https.tls.certresolver=le
      - traefik.http.services.${STACK_NAME:-exps-tracker}-adminer.loadbalancer.server.port=8080

  prestart:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG:-latest}'
    build:
      context: ./backend
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}
      - SECRET_KEY=${SECRET_KEY:?Variable not set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - FRONTEND_HOST=${FRONTEND_HOST:-http://localhost:3000}
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}

  backend:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG:-latest}'
    restart: always
    networks:
      - traefik-public
      - default
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-app}
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      - SECRET_KEY=${SECRET_KEY:?Variable not set}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - FRONTEND_HOST=${FRONTEND_HOST:-http://localhost:3000}
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    build:
      context: ./backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME:-exps-tracker}-backend.loadbalancer.server.port=8000
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-http.rule=Host(`api.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-https.rule=Host(`api.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-https.tls=true
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-backend-https.tls.certresolver=le
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: '${DOCKER_IMAGE_FRONTEND:-frontend}:${TAG:-latest}'
    restart: always
    networks:
      - traefik-public
      - default
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api.${DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.${STACK_NAME:-exps-tracker}-frontend.loadbalancer.server.port=3000
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-http.rule=Host(`dashboard.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-http.middlewares=https-redirect
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-https.rule=Host(`dashboard.${DOMAIN:-localhost}`)
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-https.tls=true
      - traefik.http.routers.${STACK_NAME:-exps-tracker}-frontend-https.tls.certresolver=le
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  app-db-data:

networks:
  traefik-public:
    external: true
